<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroGlasses - Sign In</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/signin.css" />
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="../styles/contrast.css" />
    <script src="../contrast.js"></script>
</head>
<body>
    <header class="signin-navbar">
        <div class="signin-logo">NeuroGlasses</div>
        <a href="index.html" class="dashboard-link">
            <i data-lucide="arrow-left" class="nav-icon"></i>
            <span>DASHBOARD</span>
        </a>
    </header>

    <main class="signin-page">
        <section class="signin-card">
            <h1>Sign in</h1>
            <div class="title-line"></div>

            <form class="signin-form" onsubmit="goToHome(event)">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" />

                <label for="password">Password</label>
                <input type="password" id="password" name="password" />

                <div class="signin-options">
                    <label class="remember-option">
                        <input type="checkbox" />
                        <span>Remember me</span>
                    </label>

                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>

                <a href="emotion_display.html" type="submit" class="signin-btn">Sign In</a>
            </form>
        </section>

        <p class="signup-text">
            Are you new?
            <a href="signup.html">Sign up</a>
        </p>
    </main>

    <script>
        lucide.createIcons();

        function goToHome(event) {
            event.preventDefault();
            window.location.href = "home.html";
        }
    </script>
</body>
</html>
