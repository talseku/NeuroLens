<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroGlasses - Settings</title>

    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/settings.css" />
    <link rel="stylesheet" href="../styles/contrast.css" />

    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
    <header class="navbar">
        <a href="home.html" class="logo">NeuroGlasses</a>

        <nav class="nav-links">
            <a href="home.html" class="home-link">
                <i data-lucide="home" class="nav-icon"></i>
                <span>HOME</span>
            </a>

            <a href="settings.html" class="settings-link">
                <i data-lucide="settings" class="nav-icon"></i>
                <span>SETTINGS</span>
            </a>
        </nav>
    </header>

    <main class="settings-page">
        <h1 class="page-title">Settings</h1>
        <p class="page-subtitle">Manage your preferences</p>

        <section class="settings-section">
            <h2 class="section-title">Display</h2>

            <div class="settings-card display-card">
                <div class="display-group">
                    <p class="display-label">High Contrast Mode</p>

                    <div class="button-row two-buttons">
                        <button class="option-btn active-btn" data-contrast="off">Off</button>
                        <button class="option-btn" data-contrast="on">On</button>
                    </div>
                </div>
            </div>
        </section>

        <button class="logout-btn" onclick="logout()">Log Out</button>
    </main>

    <script src="../contrast.js"></script>

    <script>
        lucide.createIcons();

        const contrastButtons = document.querySelectorAll("[data-contrast]");

        function updateButtons() {
            const saved = localStorage.getItem("highContrastMode") || "off";

            contrastButtons.forEach(btn => {
                btn.classList.remove("active-btn");

                if (btn.dataset.contrast === saved) {
                    btn.classList.add("active-btn");
                }
            });
        }

        contrastButtons.forEach(btn => {
            btn.addEventListener("click", () => {
                const mode = btn.dataset.contrast;
                setContrastMode(mode);
                updateButtons();
            });
        });

        updateButtons();

        function logout() {
            localStorage.removeItem("highContrastMode");
            window.location.href = "signin.html";
        }
    </script>
</body>
</html>
