<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuroGlasses - Sign Up</title>
    <link href="https://fonts.googleapis.com/css2?family=Comfortaa:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="signup.css" />
</head>
<body>
    <header class="signup-navbar">
        <div class="signup-logo">NeuroGlasses</div>
        <a href="index.html" class="dashboard-link">← DASHBOARD</a>
    </header>

    <main class="signup-page">
        <section class="signup-card">
            <h1>New Account</h1>
            <div class="title-line"></div>

            <form class="signup-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" />

                <label for="name">Name</label>
                <input type="text" id="name" name="name" />

                <label for="password">Password</label>
                <input type="password" id="password" name="password" />

                <button type="submit" class="create-account-btn">Create New Account</button>
            </form>
        </section>

        <p class="signin-text">
            Already have an account?
            <a href="signin.html">Sign in</a>
        </p>
    </main>
</body>
</html>
